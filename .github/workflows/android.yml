name: Build Android APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Install Cordova
        run: npm install -g cordova@11.1.0

      - name: Create and Fix Structure
        run: |
          unzip Frat.zip -d extracted_files
          cordova create myApp com.otmani.prayer PrayerApp
          cd myApp
          find ../extracted_files -name "config.xml" -exec cp {} . \;
          find ../extracted_files -name "*.html" -exec cp {} ./www/ \;
          find ../extracted_files -name "*.js" -exec cp {} ./www/ \;
          find ../extracted_files -name "*.css" -exec cp {} ./www/ \;
          find ../extracted_files -name "icon.png" -exec cp {} . \; || true

      - name: Force Gradle Fix & Build
        run: |
          cd myApp
          cordova platform add android@10.1.2
          # إصلاح يدوي لتوافق المكتبات
          echo "android.useAndroidX=true" >> platforms/android/gradle.properties
          echo "android.enableJetifier=true" >> platforms/android/gradle.properties
          # تشغيل البناء
          cordova build android --debug
