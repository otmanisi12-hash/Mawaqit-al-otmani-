name: Build Android APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Setup and Build
        run: |
          # 1. إنشاء المشروع
          cordova create myApp com.otmani.israa "Mawaqit-al-otmani"
          cd myApp
          
          # 2. فك ملفاتك مباشرة داخل مجلد www
          unzip ../Frat.zip -d ./www/
          
          # 3. محاولة نقل الملفات من أي مجلد داخلي إلى www الرئيسي
          SUB_DIR=$(find ./www -name "index.html" -exec dirname {} \;)
          if [ "$SUB_DIR" != "./www" ]; then
            cp -r $SUB_DIR/. ./www/
          fi
          
          # 4. بناء الأندرويد (سيقوم Cordova بإنشاء كل شيء تلقائياً)
          cordova platform add android@10.1.2
          cordova build android --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Prayer-App-V1
          path: myApp/platforms/android/app/build/outputs/apk/debug/app-debug.apk
