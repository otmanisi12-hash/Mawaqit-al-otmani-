name: Build Android APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Unzip and Organize
        run: |
          unzip Frat.zip
          # البحث عن ملف config.xml ونقله للمجلد الرئيسي
          find . -name "config.xml" -exec mv {} . \;
          # البحث عن مجلد www ونقله للمجلد الرئيسي
          find . -name "www" -type d -exec cp -r {}/. ./www/ \; || true
          # البحث عن الأيقونة
          find . -name "icon.png" -exec mv {} . \;

      - name: Install Cordova
        run: npm install -g cordova

      - name: Build APK
        run: |
          cordova platform add android@12.0.0
          cordova build android --debug

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: Prayer-Times-App
          path: platforms/android/app/build/outputs/apk/debug/app-debug.apk
