name: Build Android APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Prepare Project Structure
        run: |
          unzip Frat.zip -d extracted_files
          # إنشاء مجلد المشروع الجديد
          cordova create myApp com.otmani.prayer PrayerApp
          cd myApp
          # البحث عن ملف config.xml ونقله للمكان الصحيح
          find ../extracted_files -name "config.xml" -exec cp {} . \;
          # نقل كل ملفات الويب (html, js, css) إلى مجلد www
          find ../extracted_files -name "*.html" -exec cp {} ./www/ \;
          find ../extracted_files -name "*.js" -exec cp {} ./www/ \;
          find ../extracted_files -name "*.css" -exec cp {} ./www/ \;
          find ../extracted_files -name "icon.png" -exec cp {} . \; || true

      - name: Build APK
        run: |
          cd myApp
          cordova platform add android@12.0.0
          cordova build android --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Prayer-App-Final
          path: myApp/platforms/android/app/build/outputs/apk/debug/app-debug.apk
