name: Build Android APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Extract and Fix Project Structure
        run: |
          unzip Frat.zip
          # البحث عن المجلد الذي يحتوي على config.xml والدخول إليه
          ROOT_DIR=$(find . -name "config.xml" -exec dirname {} \;)
          echo "Found project root at: $ROOT_DIR"
          # نقل كل المحتويات من ذلك المجلد إلى المجلد الرئيسي للمصنع
          cp -r $ROOT_DIR/. . || true

      - name: Install Cordova
        run: npm install -g cordova

      - name: Build APK
        run: |
          cordova platform add android@12.0.0
          cordova build android --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Prayer-App-Final
          path: platforms/android/app/build/outputs/apk/debug/app-debug.apk
